<!doctype html>
<html>
<head>
<title>Select Category</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  /* 🔹 Main Box */
  .box {
    background: rgba(255, 255, 255, 0.1);
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
    text-align: center;
    backdrop-filter: blur(10px);
  }

  /* 🔹 Buttons - Glow Removed */
  button {
    padding: 15px;
    margin: 15px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #ff4b2b, #ff416c);
    color: white;
    font-size: 16px;
    cursor: pointer;
    width: 200px;
    transition: 0.3s;
    /* Glow (box-shadow) ko yahan se band kiya gaya hai */
    box-shadow: none !important; 
  }

  button:hover {
    transform: scale(1.05);
    filter: brightness(1.1);
    /* Hover par bhi glow nahi aayega */
    box-shadow: none !important;
  }

  h1 {
    margin-bottom: 20px;
  }
</style>
</head>

<body>

<div class="box">
  <h1>Category !</h1>
  <button onclick="goBrand()">🚀 Brand Marketing</button>
  <p style="color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 20px;">
    More categories coming soon...
  </p>
  
</div>

<script>
  // 🔐 Login check
  if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "login.html";
  }

  function goBrand(){
    window.location.href = "brand.html";
  }
</script>

</body>
</html>
